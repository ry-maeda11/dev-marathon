name: main deploy

on:
  push:
    branches:
      - main

jobs:
  staging:
    runs-on: ubuntu-latest

    steps:
      - id: ssh
        uses: invi5H/ssh-action@v1
        with:
          SSH_HOST: ${{ secrets.DEV_SSH_HOST }}
          SSH_PORT: ${{ secrets.DEV_SSH_PORT }}
          SSH_USER: ${{ secrets.DEV_SSH_USER }}
          SSH_KEY: ${{ secrets.DEV_SSHE_SSH_KEY }}

      - name: Deploy to Staging
        run: ssh ${{ steps.ssh.outputs.SERVER }} bash /app/ry_maeda/deploy.sh ry_maeda

      - name: Run Cypress
        run: |
          ssh ${{ steps.ssh.outputs.SERVER }} \
          "cd /ci && npx cypress run --browser chrome --spec cypress/e2e/ry_maeda.cy.js"

  production:
    needs: staging
    runs-on: ubuntu-latest

    steps:
      - id: ssh
        uses: invi5H/ssh-action@v1
        with:
          SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
          SSH_USER: ${{ secrets.PROD_SSH_USER }}
          SSH_KEY: ${{ secrets.PROD_SSH_KEY }}

      - name: Deploy to Production
        run: ssh ${{ steps.ssh.outputs.SERVER }} bash /app/ry_maeda/deploy.sh ry_maeda