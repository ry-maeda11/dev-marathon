<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>顧客詳細</title>
<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
</head>

<body>

<div class="container mt-5">

<h2>顧客詳細</h2>

<table class="table table-bordered">
<tr><th>ID</th><td id="customer_id"></td></tr>
<tr><th>会社名</th><td id="company_name"></td></tr>
<tr><th>業種</th><td id="industry"></td></tr>
<tr><th>連絡先</th><td id="contact"></td></tr>
<tr><th>所在地</th><td id="location"></td></tr>
<tr><th>作成日</th><td id="created_date"></td></tr>
<tr><th>更新日</th><td id="updated_date"></td></tr>
</table>

<a href="list.html" class="btn btn-secondary">戻る</a>

<a id="update-btn" class="btn btn-warning">編集</a>

<button id="delete-btn" class="btn btn-danger">削除</button>

</div>

<script type="module">

import config from "../config.js";

const params = new URLSearchParams(location.search);

const id = params.get("id");

fetch(`${config.apiUrl}/customers/${id}`)
.then(response => response.json())
.then(customer => {

    document.getElementById("customer_id").textContent = customer.customer_id;
    document.getElementById("company_name").textContent = customer.company_name;
    document.getElementById("industry").textContent = customer.industry;
    document.getElementById("contact").textContent = customer.contact;
    document.getElementById("location").textContent = customer.location;
    document.getElementById("created_date").textContent = customer.created_date;
    document.getElementById("updated_date").textContent = customer.updated_date;
});

document.getElementById("delete-btn").addEventListener("click", () => {

    if (!confirm("削除していいですか？")) {
        return;
    }

    fetch(`${config.apiUrl}/customers/${id}`, {
        method: "DELETE"
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            alert("削除しました");
            location.href = "list.html";
        } else {
            alert("削除に失敗しました");
        }
    });
});

document.getElementById("update-btn").href = `update.html?id=${id}`;

</script>

</body>
</html>
